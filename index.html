<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>JSON + YouTube ULTRA FIX</title>

<style>
body {font-family:Arial;background:#0f172a;color:white;padding:20px;}
.container{max-width:1000px;margin:auto;}
input,button,textarea{
  width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none;
}
button{background:#2563eb;color:white;cursor:pointer;}
textarea{height:300px;background:#020617;color:#e2e8f0;font-family:monospace;}
pre{background:black;padding:10px;}
</style>
</head>

<body>
<div class="container">

<h2>🚀 JSON FIXER + YouTube</h2>

<h3>📂 Upload JSON</h3>
<input type="file" id="file" multiple>

<button onclick="carregar()">Carregar</button>
<button onclick="validar()">Validar</button>
<button onclick="corrigir()">🛠️ Corrigir COMPLETO</button>

<button onclick="copiarCorrigido()">📋 Copiar JSON corrigido</button>
<button onclick="baixarCorrigido()">📥 Baixar JSON corrigido</button>

<textarea id="editor"></textarea>

<div id="log"></div>

</div>

<script>

let jsonCorrigido="";

// ===== LOAD =====
function carregar(){
  const files=document.getElementById("file").files;
  let texto="";

  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      texto+=e.target.result+"\n";
      document.getElementById("editor").value=texto;
    };
    r.readAsText(f);
  });
}

// ===== VALIDAR =====
function validar(){
  try{
    JSON.parse(document.getElementById("editor").value);
    log("✅ JSON válido");
  }catch(e){
    log("❌ Erro: "+e.message);
  }
}

// ===== LOG =====
function log(msg){
  document.getElementById("log").innerHTML+=msg+"<br>";
}

// ===== CORREÇÃO AVANÇADA =====
function corrigir(){

  let txt=document.getElementById("editor").value;
  let original=txt;

  log("🔧 Iniciando correção...");

  // 1. remover BOM
  txt=txt.replace(/^\uFEFF/, "");

  // 2. remover comentários
  txt=txt.replace(/\/\/.*$/gm,"");
  txt=txt.replace(/\/\*[\s\S]*?\*\//g,"");

  // 3. remover vírgulas inválidas
  txt=txt.replace(/,\s*}/g,"}");
  txt=txt.replace(/,\s*]/g,"]");

  // 4. adicionar aspas em chaves
  txt=txt.replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":');

  // 5. corrigir aspas simples
  txt=txt.replace(/'/g,'"');

  // 6. fechar estruturas
  let openBraces=(txt.match(/{/g)||[]).length;
  let closeBraces=(txt.match(/}/g)||[]).length;

  while(closeBraces<openBraces){
    txt+="}";
    closeBraces++;
  }

  let openBrackets=(txt.match(/\[/g)||[]).length;
  let closeBrackets=(txt.match(/]/g)||[]).length;

  while(closeBrackets<openBrackets){
    txt+="]";
    closeBrackets++;
  }

  // 7. tentativa de parse progressivo
  let sucesso=false;

  try{
    JSON.parse(txt);
    sucesso=true;
  }catch(e){

    log("⚠️ Tentando reconstrução inteligente...");

    try{
      // fallback: tenta converter para array de linhas válidas
      let linhas=txt.split("\n").filter(l=>l.trim()!=="");
      let arr=[];

      linhas.forEach(l=>{
        try{
          arr.push(JSON.parse(l));
        }catch{}
      });

      if(arr.length>0){
        txt=JSON.stringify(arr,null,2);
        sucesso=true;
      }

    }catch{}
  }

  if(sucesso){
    jsonCorrigido=JSON.stringify(JSON.parse(txt),null,2);
    document.getElementById("editor").value=jsonCorrigido;

    log("✅ JSON corrigido com sucesso!");
  }else{
    log("❌ Não foi possível corrigir completamente.");
  }
}

// ===== COPY =====
function copiarCorrigido(){
  if(!jsonCorrigido){
    alert("Nada corrigido ainda!");
    return;
  }
  navigator.clipboard.writeText(jsonCorrigido);
  alert("Copiado!");
}

// ===== DOWNLOAD =====
function baixarCorrigido(){
  if(!jsonCorrigido){
    alert("Nada corrigido ainda!");
    return;
  }

  const blob=new Blob([jsonCorrigido],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="corrigido.json";
  a.click();
}

</script>

</body>
</html>
