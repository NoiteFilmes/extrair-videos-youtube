<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>JSON AI ULTIMATE</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1200px; margin:auto; padding:20px; }
button { padding:10px; margin:5px; background:#2563eb; color:white; border:none; border-radius:6px;}
#editor, #diff { height:300px; margin-top:10px; }
.explicacao { background:#020617; padding:10px; margin-top:10px; }
</style>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>

<body>
<div class="container">

<h2>🤖 JSON AI ULTIMATE</h2>

<button onclick="validar()">🔍 Validar</button>
<button onclick="corrigirIA()">🧠 Corrigir com IA</button>
<button onclick="copiar()">📋 Copiar</button>
<button onclick="baixar()">📥 Baixar</button>

<div id="editor"></div>
<div id="diff"></div>

<div id="explicacao" class="explicacao"></div>

</div>

<script>
let editor, diffEditor;
let corrigido = "";

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }});
require(['vs/editor/editor.main'], function () {

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: '{ nome: "teste", idade: 30, }',
    language: 'json',
    theme: 'vs-dark'
  });

  diffEditor = monaco.editor.createDiffEditor(document.getElementById('diff'), {
    theme: 'vs-dark'
  });
});

// VALIDAR
function validar(){
  try{
    JSON.parse(editor.getValue());
    alert("JSON válido");
  }catch(e){
    alert(e.message);
  }
}

// IA
async function corrigirIA(){

  const res = await fetch("http://localhost:3000/corrigir", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ json: editor.getValue() })
  });

  const data = await res.json();

  corrigido = JSON.stringify(data.corrigido, null, 2);

  document.getElementById("explicacao").innerText = data.explicacao;

  diffEditor.setModel({
    original: monaco.editor.createModel(editor.getValue(), 'json'),
    modified: monaco.editor.createModel(corrigido, 'json')
  });
}

// COPY
function copiar(){
  navigator.clipboard.writeText(corrigido);
}

// DOWNLOAD
function baixar(){
  const blob = new Blob([corrigido], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "corrigido.json";
  a.click();
}
</script>

</body>
</html>
